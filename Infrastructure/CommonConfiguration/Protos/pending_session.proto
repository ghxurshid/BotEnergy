syntax = "proto3";

option csharp_namespace = "CommonConfiguration.Grpc";

package botenergy.session;

// UserApi'da cache'lab turilgan pending sessiya tokenini DeviceApi'ga qaytaradi.
// Oqim: Mobile → UserApi.POST /api/Session/Create → cache {userId → token, TTL=30min}
//        QR (userId + token) → device reader → DeviceApi MQTT
//        DeviceApi → gRPC GetPendingToken(userId) → UserApi cache → token
//        DeviceApi MQTT token bilan solishtirib, mos kelsa DB'ga sessiya yaratadi.
service PendingSessionService {
  rpc GetPendingToken(GetPendingTokenRequest) returns (GetPendingTokenResponse);
}

message GetPendingTokenRequest {
  int64 user_id = 1;
}

message GetPendingTokenResponse {
  // Cache'da userId uchun pending sessiya bor-yo'qligi.
  bool exists = 1;

  // Token qiymati (exists=false bo'lsa bo'sh).
  string session_token = 2;
}
